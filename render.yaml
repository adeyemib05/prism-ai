services:
  - type: web
    name: prism-ai
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: PAYMENT_MODE
        value: mock
      - key: CACHE_TTL_SECONDS
        value: 300
      - key: GROQ_API_KEY
        sync: false
